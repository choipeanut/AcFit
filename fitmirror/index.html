<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitMirror — 가상 악세사리 피팅</title>
  <link rel="stylesheet" href="./style.css" />

  <!-- MediaPipe Face Mesh -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <!-- MediaPipe Pose (Phase 2 / 목걸이 탭 시 활성화) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- 카메라 권한 오류 화면 -->
  <div id="error-screen" class="hidden">
    <div class="error-box">
      <div class="error-icon">📷</div>
      <h2>카메라 접근 권한이 필요합니다</h2>
      <p>FitMirror는 실시간 피팅을 위해 웹캠이 필요합니다.<br>브라우저 주소창 옆의 카메라 아이콘을 클릭하여 권한을 허용해주세요.</p>
      <button id="retry-btn" class="btn-primary">다시 시도</button>
    </div>
  </div>

  <!-- 로딩 화면 -->
  <div id="loading-screen">
    <div class="loading-box">
      <div class="skeleton-logo">FitMirror</div>
      <div class="spinner"></div>
      <p id="loading-text">AI 모델 로딩 중...</p>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="app" class="hidden">

    <!-- 헤더 -->
    <header class="header">
      <div class="header-title">
        <span class="logo-icon">✨</span>
        <h1>FitMirror</h1>
      </div>
      <div class="header-actions">
        <button id="capture-btn" class="icon-btn" title="캡처 저장">📸</button>
        <button id="switch-camera-btn" class="icon-btn" title="카메라 전환">🔄</button>
      </div>
    </header>

    <!-- 메인 레이아웃 -->
    <main class="main-layout">

      <!-- 캔버스 영역 -->
      <div class="canvas-wrapper">
        <video id="input-video" autoplay playsinline muted></video>
        <canvas id="output-canvas"></canvas>
        <!-- 토스트 메시지 -->
        <div id="toast" class="toast hidden"></div>
      </div>

      <!-- 사이드 패널 -->
      <aside class="side-panel">

        <!-- 카테고리 탭 -->
        <div class="tab-bar">
          <button class="tab-btn" data-category="hat">모자</button>
          <button class="tab-btn active" data-category="earring">귀걸이</button>
          <button class="tab-btn" data-category="necklace">목걸이</button>
        </div>

        <!-- 아이템 그리드 -->
        <div class="item-grid" id="item-grid">
          <!-- JS로 동적 렌더 -->
        </div>

        <!-- 모자 치수 컨트롤 (모자 탭에서만 표시) -->
        <div class="hat-controls hidden" id="hat-controls">
          <label class="control-label">
            모자 둘레 (cm)
            <span id="hat-size-value">58</span>
          </label>
          <input
            type="range"
            id="hat-size-slider"
            min="52"
            max="64"
            value="58"
            step="0.5"
            class="slider"
          />
        </div>

        <!-- 선택 해제 버튼 -->
        <div class="deselect-area">
          <button id="deselect-btn" class="btn-secondary">선택 해제</button>
        </div>

      </aside>
    </main>

    <!-- 하단 바 -->
    <footer class="footer">
      <button id="capture-btn-footer" class="btn-primary">📸 캡처 저장</button>
      <div class="filter-control">
        <label class="control-label">
          필터 강도
          <span id="filter-value">50</span>%
        </label>
        <input
          type="range"
          id="filter-slider"
          min="0"
          max="100"
          value="50"
          class="slider"
        />
      </div>
    </footer>

  </div>

  <!-- 모바일: 하단 drawer 토글 버튼 -->
  <button id="drawer-toggle" class="drawer-toggle hidden">☰ 아이템 선택</button>

  <script type="module" src="./main.js"></script>
</body>
</html>
