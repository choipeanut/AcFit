<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 55" width="300" height="55">
  <!-- 체인 (상단 기준선 — CHAIN_Y_FRAC=0.08 → y≈4) -->
  <line x1="0"   y1="4" x2="300" y2="4" stroke="#b0b0b0" stroke-width="2"   stroke-dasharray="5,3"/>
  <line x1="0"   y1="3" x2="300" y2="3" stroke="#d5d5d5" stroke-width="0.8" stroke-dasharray="5,3" stroke-dashoffset="3"/>
  <!-- 펜던트 연결줄 -->
  <line x1="150" y1="4"  x2="150" y2="16" stroke="#a0a0a0" stroke-width="1.8"/>
  <!-- 다이아몬드 펜던트 본체 -->
  <polygon points="150,16 165,35 150,53 135,35" fill="#b8b8b8"/>
  <polygon points="150,18 163,35 150,51 137,35" fill="#d2d2d2"/>
  <!-- 상단 면 (밝음) -->
  <polygon points="150,18 163,35 150,32" fill="#e8e8e8"/>
  <!-- 하이라이트 포인트 -->
  <polygon points="150,19 156,32 150,30" fill="white" opacity="0.5"/>
  <!-- 테두리 -->
  <polygon points="150,16 165,35 150,53 135,35" fill="none" stroke="#9a9a9a" stroke-width="0.8"/>
</svg>
