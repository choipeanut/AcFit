<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 54 62" width="54" height="62">
  <defs>
    <radialGradient id="rg" cx="38%" cy="34%">
      <stop offset="0%"   stop-color="#f5c4b8"/>
      <stop offset="45%"  stop-color="#d4806c"/>
      <stop offset="100%" stop-color="#9e3d30"/>
    </radialGradient>
  </defs>
  <!-- 포스트 (귀 뒤 잠금 장치) -->
  <line x1="27" y1="4" x2="27" y2="20" stroke="#c06055" stroke-width="2.8" stroke-linecap="round"/>
  <!-- 메인 원형 스터드 -->
  <circle cx="27" cy="42" r="20" fill="#b05545"/>
  <circle cx="27" cy="42" r="20" fill="url(#rg)"/>
  <!-- 장미꽃 무늬 (꽃잎 6개) -->
  <g transform="translate(27,42)" opacity="0.35">
    <ellipse rx="5" ry="9" transform="rotate(0)"   fill="#f8d0c8"/>
    <ellipse rx="5" ry="9" transform="rotate(60)"  fill="#f8d0c8"/>
    <ellipse rx="5" ry="9" transform="rotate(120)" fill="#f8d0c8"/>
    <ellipse rx="5" ry="9" transform="rotate(180)" fill="#f8d0c8"/>
    <ellipse rx="5" ry="9" transform="rotate(240)" fill="#f8d0c8"/>
    <ellipse rx="5" ry="9" transform="rotate(300)" fill="#f8d0c8"/>
  </g>
  <!-- 중앙 -->
  <circle cx="27" cy="42" r="6" fill="#e8907c" opacity="0.7"/>
  <circle cx="27" cy="42" r="3" fill="#fce8e0" opacity="0.6"/>
  <!-- 하이라이트 -->
  <ellipse cx="20" cy="34" rx="6" ry="4" fill="white" opacity="0.4"/>
  <!-- 테두리 -->
  <circle cx="27" cy="42" r="20" fill="none" stroke="#9e4038" stroke-width="1.5"/>
</svg>
