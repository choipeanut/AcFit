<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 140" width="64" height="140">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="50%" stop-color="#a8d8f0"/>
      <stop offset="100%" stop-color="#6ab4d8"/>
    </linearGradient>
  </defs>
  <!-- 훅 -->
  <path d="M32,4 Q47,4 47,20 Q47,34 32,36" fill="none" stroke="#d4a017" stroke-width="3.5" stroke-linecap="round"/>
  <!-- 메인 커넥터 -->
  <line x1="32" y1="36" x2="32" y2="48" stroke="#c8960c" stroke-width="2"/>
  <!-- 크로스바 -->
  <line x1="10" y1="48" x2="54" y2="48" stroke="#c8960c" stroke-width="2.5"/>
  <circle cx="10" cy="48" r="3" fill="#d4a017"/>
  <circle cx="32" cy="48" r="3" fill="#d4a017"/>
  <circle cx="54" cy="48" r="3" fill="#d4a017"/>

  <!-- 왼쪽 체인 + 크리스탈 -->
  <line x1="10" y1="51" x2="8"  y2="72" stroke="#c8960c" stroke-width="1.2"/>
  <polygon points="8,72 16,89 8,106 0,89"   fill="url(#cg)" opacity="0.9"/>
  <polygon points="8,72 16,89 8,95"          fill="white"    opacity="0.45"/>
  <line   x1="8" y1="72" x2="8" y2="72"    stroke="#c8960c" stroke-width="1"/>

  <!-- 가운데 체인 + 크리스탈 (더 길고 큼) -->
  <line x1="32" y1="51" x2="32" y2="64" stroke="#c8960c" stroke-width="1.2"/>
  <polygon points="32,64 41,86 32,108 23,86" fill="url(#cg)" opacity="0.92"/>
  <polygon points="32,64 41,86 32,94"         fill="white"    opacity="0.5"/>
  <!-- 아래 작은 크리스탈 -->
  <line x1="32" y1="108" x2="32" y2="118" stroke="#c8960c" stroke-width="1"/>
  <polygon points="32,118 38,128 32,138 26,128" fill="#7ec8e3" opacity="0.9"/>
  <polygon points="32,118 38,128 32,132"        fill="white"   opacity="0.5"/>

  <!-- 오른쪽 체인 + 크리스탈 -->
  <line x1="54" y1="51" x2="56" y2="72" stroke="#c8960c" stroke-width="1.2"/>
  <polygon points="56,72 64,89 56,106 48,89" fill="url(#cg)" opacity="0.9"/>
  <polygon points="56,72 64,89 56,95"         fill="white"    opacity="0.45"/>
</svg>
